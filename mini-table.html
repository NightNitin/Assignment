<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-table</title>
    <style>
        table{
            width: 100%;
        }
    </style>
</head>
<body>
    <table>
        <tbody>
            <tr>
                <td><b>Student Name</b></td>
                <td><b>:</b></td>
                <td>Rahul Sharma</td>
                <td><b>School Name</b></td>
                <td><b>:</b></td>
                <td>Green Valley School</td>
                <td rowspan="4"><img src="./Rahul.png" alt="Rahul's image"  height="200px"></td>
            </tr>
            <tr>
                <td><b>Roll Number</b></td>
                <td><b>:</b></td>
                <td>10123</td>
                <td><b>Academic Year</b></td>
                <td><b>:</b></td>
                <td>2023-24</td>
            </tr>
            <tr>
                <td><b>Class</b></td>
                <td><b>:</b></td>
                <td>12th</td>
                <td><b>Exam Type</b></td>
                <td><b>:</b></td>
                <td>Annual Examination</td>
            </tr>
            <tr>
                <td><b>Section</b></td>
                <td><b>:</b></td>
                <td>A</td>
                <td><b>Date</b></td>
                <td><b>:</b></td>
                <td>20 May 2024</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
